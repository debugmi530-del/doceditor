name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK (local Gradle, no EAS)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('artifacts/doceditor/android/**/*.gradle*') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate native Android project (expo prebuild)
        working-directory: artifacts/doceditor
        run: npx expo prebuild --platform android --no-install --clean

      - name: Make Gradle wrapper executable
        working-directory: artifacts/doceditor/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: artifacts/doceditor/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p output
          cp artifacts/doceditor/android/app/build/outputs/apk/debug/app-debug.apk \
             output/doceditor-$(date +%Y%m%d-%H%M).apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: doceditor-apk
          path: output/*.apk
          retention-days: 30

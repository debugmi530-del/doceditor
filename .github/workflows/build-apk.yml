name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Expo Prebuild (generate android/ folder)
        working-directory: artifacts/doceditor
        run: npx expo prebuild --platform android --no-install
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Make gradlew executable
        working-directory: artifacts/doceditor/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: artifacts/doceditor/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: doceditor-debug-${{ github.run_number }}
          path: artifacts/doceditor/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Delete old release if exists
        run: |
          OLD_ID=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/latest-debug \
            | node -e "try{process.stdout.write(String(JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).id||''))}catch(e){}")
          if [ -n "$OLD_ID" ]; then
            curl -s -X DELETE -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              https://api.github.com/repos/${{ github.repository }}/releases/$OLD_ID
          fi
          OLD_TAG_SHA=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/git/refs/tags/latest-debug \
            | node -e "try{process.stdout.write(JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).object?.sha||'')}catch(e){}")
          if [ -n "$OLD_TAG_SHA" ]; then
            curl -s -X DELETE -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              https://api.github.com/repos/${{ github.repository }}/git/refs/tags/latest-debug
          fi

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-debug
          name: "DocEditor APK (сборка #${{ github.run_number }})"
          body: |
            Автоматическая debug-сборка Android APK.
            Коммит: ${{ github.sha }}
            Сборка: #${{ github.run_number }}

            **Как установить:**
            1. Скачайте `app-debug.apk` ниже
            2. На телефоне: Настройки → Безопасность → Разрешить из неизвестных источников
            3. Откройте скачанный файл и установите
          files: artifacts/doceditor/android/app/build/outputs/apk/debug/app-debug.apk
          prerelease: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
